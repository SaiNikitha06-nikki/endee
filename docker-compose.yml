version: '3.8'

services:
  # Endee Vector Database Service
  endee:
    image: endeehq/endee:latest
    container_name: endee-db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - endee-network

  # AI Search & RAG Application Service
  app:
    build:
      context: ./ai-search-project
      dockerfile: Dockerfile
    container_name: endee-search-app
    ports:
      - "5000:5000"
    environment:
      - ENDEE_HOST=endee
      - ENDEE_PORT=8080
      - ENDEE_INDEX_NAME=documents
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - EMBEDDING_DIMENSION=384
      - DEBUG=False
      - MAX_RESULTS=5
      - SIMILARITY_THRESHOLD=0.3
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_URL=${LLM_API_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - CORS_ORIGINS=*
    depends_on:
      endee:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - endee-network
    volumes:
      - ./ai-search-project:/app

  # Optional: Nginx Reverse Proxy (uncomment to use)
  # nginx:
  #   image: nginx:latest
  #   container_name: endee-proxy
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - endee-network

volumes:
  endee_data:
    driver: local

networks:
  endee-network:
    driver: bridge
